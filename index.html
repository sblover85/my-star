<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>별별감성</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: #f8f9fa; color: #333; line-height: 1.5; }
        .container { max-width: 500px; margin: 0 auto; background: white; min-height: 100vh; }

        /* 🖼️ 상단 메인 배너 */
        .main-banner { width: 100%; height: 250px; background: url('header_bg.jpg') no-repeat center/cover; }

        /* 📂 링크 버튼 구역 */
        .link-section { padding: 20px; }
        .big-btn { display: block; width: 100%; padding: 15px 0; border-radius: 12px; text-align: center; text-decoration: none; color: white; font-weight: bold; font-size: 16px; margin-bottom: 12px; border: none; cursor: pointer; }
        .btn-orange { background: #e89ab5; } /* 달봉이마켓 굿즈 */
        .btn-blue { background: #7ec0c8; }   /* 달봉이마켓 아동복 */

       /* 🔗 SNS 아이콘 구역 (블로그 아이콘 수정) */
        .sns-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 10px 0 30px; }
        .sns-item { text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 12px; color: #666; }
        .sns-icon { width: 52px; height: 52px; border-radius: 14px; margin-bottom: 8px; object-fit: cover; }

        /* 📸 하단 이미지 메뉴 (3개) */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 0 10px 20px; }
        .menu-item { position: relative; border-radius: 15px; overflow: hidden; height: 160px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .menu-item img { width: 100%; height: 100%; object-fit: cover; }
        .menu-label { position: absolute; bottom: 0; width: 100%; background: rgba(255,255,255,0.8); text-align: center; padding: 8px 0; font-size: 12px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-banner"></div>

    <div class="link-section">
        <a href="https://smartstore.naver.com/beolbeol" class="big-btn btn-orange">🛍️ 달봉이마켓 굿즈 보러가기</a>
        <a href="https://smartstore.naver.com/beolbeol" class="big-btn btn-blue">👕 달봉이마켓 아동복 보러가기</a>

        <div class="sns-grid">
            <a href="https://blog.naver.com/sblover85" class="sns-item">
               <img src="https://blog.kakaocdn.net/dn/866In/btrS0M7WInS/N6Wkk9Y4rK4KkKk4KkKk4K/img.png" class="sns-icon" alt="블로그">
                <span>블로그</span>
            </a>
            <a href="#" class="sns-item">
                <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" class="sns-icon">
                <span>유튜브</span>
            </a>
            <a href="#" class="sns-item">
                <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" class="sns-icon">
                <span>인스타</span>
            </a>
            <a href="#" class="sns-item">
                <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" class="sns-icon">
                <span>틱톡</span>
            </a>
        </div>

        <div class="menu-grid">
            <div class="menu-item">
                <img src="cat_food.jpg">
                <div class="menu-label">맛도리사냥꾼</div>
            </div>
            <div class="menu-item">
                <img src="cat_kids.jpg">
                <div class="menu-label">육아일상</div>
            </div>
            <div class="menu-item">
                <img src="cat_market.jpg">
                <div class="menu-label">마켓상품</div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
